spring.application.name=mpesa-c2b-api

# Active profiles
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

# Database configuration - PostgreSQL
spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DATABASE_USERNAME}
spring.datasource.password=${DATABASE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate configuration
# Database migrations are handled by knexfile.js in GIL industries repo
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# Server configuration
server.port=8080

# Actuator endpoints
management.endpoints.web.exposure.include=health,info,metrics

# Daraja/M-Pesa Configuration
mpesa.consumer.key=${DARAJA_CONSUMER_KEY}
mpesa.consumer.secret=${DARAJA_CONSUMER_SECRET}
mpesa.shortcode=${DARAJA_SHORTCODE:600984}
mpesa.lipa-na-mpesa-shortcode=${DARAJA_LIPA_SHORTCODE:${DARAJA_SHORTCODE:600984}}
mpesa.passkey=${DARAJA_PASSKEY:}
mpesa.response.type=${DARAJA_RESPONSE_TYPE:Completed}
mpesa.environment=${DARAJA_ENVIRONMENT:sandbox}
mpesa.initiator-name=${DARAJA_INITIATOR_NAME:}
mpesa.security-credential=${DARAJA_SECURITY_CREDENTIAL:}
mpesa.timeout-url=${DARAJA_TIMEOUT_URL:http://localhost:8080/api/v1/mpesa/results/timeout}
mpesa.result-url=${DARAJA_RESULT_URL:http://localhost:8080/api/v1/mpesa/results}

# Daraja API Endpoints
mpesa.sandbox-base-url=https://sandbox.safaricom.co.ke
mpesa.production-base-url=https://api.safaricom.co.ke
mpesa.endpoints.oauth=/oauth/v1/generate?grant_type=client_credentials
mpesa.endpoints.stk-push=/mpesa/stkpush/v1/processrequest
mpesa.endpoints.stk-push-query=/mpesa/stkpushquery/v1/query
mpesa.endpoints.c2b-register=/mpesa/c2b/v2/registerurl
mpesa.endpoints.c2b-simulate=/mpesa/c2b/v1/simulate
mpesa.endpoints.b2c=/mpesa/b2c/v3/paymentrequest
mpesa.endpoints.b2b=/mpesa/b2b/v1/paymentrequest
mpesa.endpoints.transaction-status=/mpesa/transactionstatus/v1/query
mpesa.endpoints.account-balance=/mpesa/accountbalance/v1/query
mpesa.endpoints.reversal=/mpesa/reversal/v1/request
mpesa.endpoints.dynamic-qr=/mpesa/qrcode/v1/generate

# Callback URLs 
mpesa.confirmation-url=${DARAJA_CONFIRMATION_URL:http://localhost:8080/api/v1/mpesa/c2b/confirmation}
mpesa.validation-url=${DARAJA_VALIDATION_URL:http://localhost:8080/api/v1/mpesa/c2b/validation}
mpesa.callback-url=${DARAJA_STK_CALLBACK_URL:http://localhost:8080/api/v1/mpesa/results/stk}

app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:*}
