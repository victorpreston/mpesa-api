name: CI - Dev

on:
  push:
    branches:
      - dev
      - "feature/**"
  pull_request:
    branches:
      - dev

permissions:
  contents: read

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Make Maven wrapper executable
        run: chmod +x ./mvnw

      - name: Compile
        run: ./mvnw -B -DskipTests compile

      - name: Test
        run: ./mvnw -B -Dspring.profiles.active=dev test

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: build-and-test
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t mpesa-daraja-api:${{ github.sha }} .
