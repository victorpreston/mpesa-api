name: SDK Package

on:
  push:
    branches:
      - "sdk/**"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  package:
    name: Package SDK Candidate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Make Maven wrapper executable
        run: chmod +x ./mvnw

      - name: Package without tests
        run: ./mvnw -B -DskipTests package
